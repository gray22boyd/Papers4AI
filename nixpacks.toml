[phases.setup]
nixPkgs = ["python311", "git"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
    "git clone --depth 1 https://github.com/papercopilot/paperlists.git ../paperlists",
    "mkdir -p data",
    "python scripts/aggregate_papers.py"
]

[start]
cmd = "cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1"
